<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Appointment Booking</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header, footer {
            background-color: #0073e6;
            color: white;
            text-align: center;
            padding: 20px;
        }
        section {
            padding: 30px;
            background-color: white;
            margin: 20px auto;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            text-align: center;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        input, button, select {
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            background-color: #0073e6;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #005bb5;
        }
        #services-section, #doctor-list, #search-section {
            display: none;
        }
        .loading {
            display: none;
            font-size: 18px;
            font-weight: bold;
        }
        #services-section h2 {
            font-size: 30px;
        }
        .service-button {
            display: block;
            width: 80%;
            margin: 10px auto;
            padding: 10px;
            font-size: 16px;
            text-align: center;
            background-color: #0073e6;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .service-button:hover {
            background-color: #005bb5;
        }
    </style>
    <script>
        const hospitalData = {
            "Downtown": {
                "Downtown Clinic": [
                    { name: "Dr. Smith", specialty: "Cardiologist" },
                    { name: "Dr. Adams", specialty: "Dermatologist" }
                ]
            },
            "Suburban": {
                "Suburban Medical Center": [
                    { name: "Dr. Johnson", specialty: "Pediatrician" },
                    { name: "Dr. Brown", specialty: "Orthopedic" }
                ]
            },
            "City Hospital": {
                "City Hospital Main Branch": [
                    { name: "Dr. Miller", specialty: "Neurologist" },
                    { name: "Dr. Wilson", specialty: "General Physician" }
                ]
            }
        };

        function showSearch() {
            document.getElementById('loading-text').style.display = 'block';
            setTimeout(() => {
                document.getElementById('loading-text').style.display = 'none';
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('services-section').style.display = 'block';
            }, 1000);
        }
        
        function showDoctorSearch() {
            document.getElementById('services-section').style.display = 'none';
            document.getElementById('search-section').style.display = 'block';
        }
        
        function updateHospitals() {
            const locationSelect = document.getElementById("location").value;
            const hospitalSelect = document.getElementById("hospital");
            hospitalSelect.innerHTML = '<option value="">--Select Hospital--</option>';
            
            if (hospitalData[locationSelect]) {
                Object.keys(hospitalData[locationSelect]).forEach(hospital => {
                    let option = document.createElement("option");
                    option.value = hospital;
                    option.textContent = hospital;
                    hospitalSelect.appendChild(option);
                });
            }
            updateDoctors();
        }
        
        function updateDoctors() {
            const locationSelect = document.getElementById("location").value;
            const hospitalSelect = document.getElementById("hospital").value;
            const doctorList = document.getElementById("doctor-list");
            doctorList.innerHTML = '';
            
            if (hospitalData[locationSelect] && hospitalData[locationSelect][hospitalSelect]) {
                hospitalData[locationSelect][hospitalSelect].forEach(doctor => {
                    let listItem = document.createElement("li");
                    let checkbox = document.createElement("input");
                    checkbox.type = "checkbox";
                    checkbox.value = doctor.name;
                    listItem.appendChild(checkbox);
                    listItem.appendChild(document.createTextNode(` ${doctor.name} - ${doctor.specialty}`));
                    doctorList.appendChild(listItem);
                });
                doctorList.style.display = 'block';
            } else {
                doctorList.style.display = 'none';
            }
        }
    </script>
</head>
<body>
    <header>
        <h1>My Health</h1>
    </header>
    
    <section id="login-section">
        <h2>Login</h2>
        <p id="loading-text" class="loading">Logging in...</p>
        <form onsubmit="event.preventDefault(); showSearch();">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required aria-label="Username">
            
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required aria-label="Password">
            
            <button type="submit">Login</button>
        </form>
    </section>
    
    <section id="services-section">
        <h2>Our Services</h2>
        <button class="service-button">Online Consultation</button>
        <button class="service-button" onclick="showDoctorSearch()">Slot Booking</button>
        <button class="service-button">Doctor Availability Check</button>
        <button class="service-button">Prescription Management</button>
        <button class="service-button">Emergency Services</button>
    </section>
    
    <section id="search-section">
        <h2>Search for a Doctor</h2>
        <form>
            <label for="location">Select Location:</label>
            <select id="states" name="states">
                <option>Select state</option>
                <option value="AN">Andaman and Nicobar Islands</option>
                <option value="AP">Andhra Pradesh</option>
                <option value="AR">Arunachal Pradesh</option>
                <option value="AS">Assam</option>
                <option value="BR">Bihar</option>
                <option value="CH">Chandigarh</option>
                <option value="CT">Chhattisgarh</option>
                <option value="DN">Dadra and Nagar Haveli</option>
                <option value="DD">Daman and Diu</option>
                <option value="DL">Delhi</option>
                <option value="GA">Goa</option>
                <option value="GJ">Gujarat</option>
                <option value="HR">Haryana</option>
                <option value="HP">Himachal Pradesh</option>
                <option value="JK">Jammu and Kashmir</option>
                <option value="JH">Jharkhand</option>
                <option value="KA">Karnataka</option>
                <option value="KL">Kerala</option>
                <option value="LA">Ladakh</option>
                <option value="LD">Lakshadweep</option>
                <option value="MP">Madhya Pradesh</option>
                <option value="MH">Maharashtra</option>
                <option value="MN">Manipur</option>
                <option value="ML">Meghalaya</option>
                <option value="MZ">Mizoram</option>
                <option value="NL">Nagaland</option>
                <option value="OR">Odisha</option>
                <option value="PY">Puducherry</option>
                <option value="PB">Punjab</option>
                <option value="RJ">Rajasthan</option>
                <option value="SK">Sikkim</option>
                <option value="TN">Tamil Nadu</option>
                <option value="TG">Telangana</option>
                <option value="TR">Tripura</option>
                <option value="UP">Uttar Pradesh</option>
                <option value="UT">Uttarakhand</option>
                <option value="WB">West Bengal</option>
            </select>
            <label for="hospital">Select Hospital:</label>
            <select id="hospital" name="hospital" onchange="updateDoctors()">
                <option value="">select hospital</option>
                <option value="YS">YASHODA HOSPITAL</option>
                <option value="KH">KAMINENI HOSPITAL</option>
                <option value="VH">VASAVI HOSPITAL</option>
                <option value="AH">APOLLO HOSPITAL</option>
                <option value="CL">CUREWELL HOSPITAL</option>
                <option value="NH">NICE HOSPITAL</option>
                <option value="CH">CARE HOSPITAL</option>
                <option value="CKR">CKR HOSPITAL</option>
                <option value="SH">SAMRAKSHA HOSPITAL</option>
                <option value="MC">MAXCARE HOSPITAL</option>
                <option value="NH">NISHA HOSPITAL</option>
                <option value="YH">YASHODA HOSPITAL</option>
            </select>
            
            <ul id="doctor-list" style="display: none;"></ul> 
    </form>
    <a href="page2.html">
        <button>Next</button>
    </a>
  </section>
    
    <footer>
        <p>&copy; 2025 City Hospital. All Rights Reserved.</p>
    </footer>
</body>
</html>
